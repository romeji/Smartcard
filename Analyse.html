<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Smart Receipt AI V5</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
.container { max-width:900px; margin:auto; background:#1e293b; padding:20px; border-radius:12px;}
button { padding:10px; margin:5px; border:none; border-radius:8px; background:#22c55e; color:white;}
table { width:100%; margin-top:20px; border-collapse:collapse;}
td,th { padding:10px; border-bottom:1px solid #334155;}
td[contenteditable] { background:#0f172a;}
</style>
</head>

<body>

<div class="container">
<h1>🧾 Smart Receipt AI V5</h1>

<input type="file" id="file">
<button onclick="analyze()">Analyser</button>

<table>
<thead>
<tr>
<th>Produit</th>
<th>Qté</th>
<th>Prix</th>
<th>Confiance</th>
</tr>
</thead>
<tbody id="out"></tbody>
</table>

</div>

<script>

// 🔥 DICTIONNAIRE ABRÉVIATIONS
const abbr = {
  "bq":"barquette","tom":"tomate","cerise":"cerise",
  "ssn":"sans","chocola":"chocolat","comp":"compote",
  "pom":"pomme","lpm":"lait","rech":"recharge",
  "cre":"creme","bat":"baton","pap":"papier",
  "mais":"mais","poivron":"poivron"
};

// 🔥 DICTIONNAIRE PRODUITS
const dict = [
 "barquette tomate cerise",
 "barres sans chocolat",
 "compote pomme",
 "cereales crunchy",
 "kombucha peche",
 "kombucha menthe",
 "mais poivron"
];

// 🔥 LEVENSHTEIN
function lev(a,b){
 const m=[];
 for(let i=0;i<=b.length;i++){m[i]=[i]}
 for(let j=0;j<=a.length;j++){m[0][j]=j}
 for(let i=1;i<=b.length;i++){
  for(let j=1;j<=a.length;j++){
   m[i][j]=b[i-1]==a[j-1]?m[i-1][j-1]:
   Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1)
  }
 }
 return m[b.length][a.length]
}

// 🔥 EXPANSION
function expand(name){
 return name.split(" ").map(w=>abbr[w]||w).join(" ")
}

// 🔥 CORRECTION IA
function correct(name){
 let best=name,score=999
 dict.forEach(d=>{
  const s=lev(name,d)
  if(s<score){score=s;best=d}
 })
 return score<=5?best:name
}

// 🔥 CLEAN
function clean(line){
 return line.toLowerCase()
 .replace(/[^a-z0-9\s.,]/g,"")
 .replace(/\s+/g," ")
 .trim()
}

// 🔥 EXTRACTION PRO
function parse(text){
 const lines=text.split("\n")
 const res=[]

 lines.forEach(l=>{
  l=clean(l)

  if(!l.match(/\d+[.,]\d{2}$/)) return

  const price=l.match(/(\d+[.,]\d{2})$/)[1]
  let name=l.replace(price,"").trim()

  name=expand(name)
  name=correct(name)

  if(name.length<3) return

  res.push({
    name,
    qty:1,
    price:parseFloat(price.replace(",", ".")),
    confidence: name.length>5?0.9:0.7
  })
 })

 return res
}

// 🔥 OCR + ANALYSE
async function analyze(){
 const f=document.getElementById("file").files[0]
 if(!f) return alert("Ajoute image")

 const r=await Tesseract.recognize(f,'fra')
 const data=parse(r.data.text)

 const tbody=document.getElementById("out")
 tbody.innerHTML=""

 data.forEach(p=>{
  const tr=document.createElement("tr")
  tr.innerHTML=`
  <td contenteditable>${p.name}</td>
  <td contenteditable>${p.qty}</td>
  <td>${p.price}</td>
  <td>${Math.round(p.confidence*100)}%</td>
  `
  tbody.appendChild(tr)
 })
}

</script>

</body>
</html>
