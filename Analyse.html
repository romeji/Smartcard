<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Smart Receipt AI V6 (Mistral)</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
.container { max-width:900px; margin:auto; background:#1e293b; padding:20px; border-radius:12px;}
button { padding:10px; margin:5px; border:none; border-radius:8px; background:#22c55e; color:white;}
table { width:100%; margin-top:20px; border-collapse:collapse;}
td,th { padding:10px; border-bottom:1px solid #334155;}
td[contenteditable] { background:#0f172a;}
#status { margin-top:10px; }
</style>
</head>

<body>

<div class="container">
<h1>🧾 Smart Receipt AI V6 (Mistral)</h1>

<input type="file" id="file">
<button onclick="analyze()">Analyser</button>

<div id="status"></div>

<table>
<thead>
<tr>
<th>Produit</th>
<th>Prix</th>
<th>Confiance</th>
</tr>
</thead>
<tbody id="out"></tbody>
</table>

</div>

<script>

// 🔥 CONFIG
const API_KEY = "jOTJWyqoNRUtmbd0KL5QP2ncDmBofky2";

// 🔥 CACHE LOCAL
let cache = JSON.parse(localStorage.getItem("ai_cache") || "{}");

// 🔥 OCR CLEAN
function clean(line){
 return line.toLowerCase()
 .replace(/[^a-z0-9\s.,]/g,"")
 .replace(/\s+/g," ")
 .trim()
}

// 🔥 PARSE PRIX
function extractLines(text){
 const lines = text.split("\n");
 return lines.filter(l => l.match(/\d+[.,]\d{2}/));
}

// 🔥 APPEL IA MISTRAL
async function askAI(text){

  // cache
  if(cache[text]) return cache[text];

  document.getElementById("status").innerText = "🧠 IA en cours...";

  const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "mistral-small",
      messages: [
        {
          role: "system",
          content: "Tu es un expert des tickets de caisse français. Corrige et reformule les noms de produits de manière claire."
        },
        {
          role: "user",
          content: `Corrige ce produit de ticket OCR: "${text}". Répond uniquement avec le vrai nom.`
        }
      ]
    })
  });

  const data = await res.json();
  const result = data.choices[0].message.content.trim();

  cache[text] = result;
  localStorage.setItem("ai_cache", JSON.stringify(cache));

  return result;
}

// 🔥 ANALYSE PRINCIPALE
async function analyze(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Ajoute une image");

  document.getElementById("status").innerText = "📸 OCR en cours...";

  const ocr = await Tesseract.recognize(file, 'fra');
  const lines = extractLines(ocr.data.text);

  const tbody = document.getElementById("out");
  tbody.innerHTML = "";

  for(let line of lines){

    line = clean(line);

    const priceMatch = line.match(/(\d+[.,]\d{2})/);
    if(!priceMatch) continue;

    const price = priceMatch[1];
    let name = line.replace(price, "").trim();

    if(name.length < 3) continue;

    // 🧠 IA
    const interpreted = await askAI(name);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${interpreted}</td>
      <td>${price}</td>
      <td>IA</td>
    `;

    tbody.appendChild(tr);
  }

  document.getElementById("status").innerText = "✅ Terminé";
}

</script>

</body>
</html>
