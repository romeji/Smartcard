<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Smart Receipt AI V8 ULTIME</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
.container { max-width:1000px; margin:auto; background:#1e293b; padding:20px; border-radius:12px;}
button { padding:10px; margin:5px; border:none; border-radius:8px; background:#22c55e; color:white;}
table { width:100%; margin-top:20px; border-collapse:collapse;}
td,th { padding:10px; border-bottom:1px solid #334155;}
#status { margin-top:10px; }
.badge { padding:4px 8px; border-radius:6px; background:#334155;}
</style>
</head>

<body>

<div class="container">
<h1>🧾 Smart Receipt AI V8 ULTIME</h1>

<input type="file" id="file">
<button onclick="analyze()">Analyser</button>

<div id="status"></div>

<table>
<thead>
<tr>
<th>Produit</th>
<th>Prix</th>
<th>Match</th>
<th>Score</th>
</tr>
</thead>
<tbody id="out"></tbody>
</table>

</div>

<script>

const API_KEY = "jOTJWyqoNRUtmbd0KL5QP2ncDmBofky2";
let cache = JSON.parse(localStorage.getItem("ai_cache") || "{}");

// 🔥 BASE PRODUITS (simulée)
const productDB = [
 "Tomates cerises 250g",
 "Barres céréales sans chocolat",
 "Céréales crunchy Nestlé",
 "Kombucha pêche bio",
 "Maïs poivron en conserve",
 "Objet décoration maison"
];

// 🧠 SIMILARITÉ
function similarity(a,b){
 a=a.toLowerCase(); b=b.toLowerCase();
 let score=0;
 a.split(" ").forEach(w=>{
  if(b.includes(w)) score++;
 });
 return score / a.split(" ").length;
}

// 🔥 MATCHING
function matchProduct(name){
 let best=null, bestScore=0;

 productDB.forEach(p=>{
  const s = similarity(name,p);
  if(s>bestScore){
    bestScore=s;
    best=p;
  }
 });

 return {best, score:bestScore};
}

// 🧠 IMAGE
async function preprocess(file){
 return new Promise(res=>{
  const img=new Image();
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);

    let d=ctx.getImageData(0,0,canvas.width,canvas.height);
    let data=d.data;

    for(let i=0;i<data.length;i+=4){
      let avg=(data[i]+data[i+1]+data[i+2])/3;
      avg=avg>140?255:0;
      data[i]=data[i+1]=data[i+2]=avg;
    }

    ctx.putImageData(d,0,0);
    res(canvas);
  };

  img.src=URL.createObjectURL(file);
 });
}

// 🔍 CLEAN
function clean(l){
 return l.toLowerCase()
 .replace(/[^a-z0-9\s.,]/g,"")
 .replace(/\s+/g," ")
 .trim();
}

// 🔍 EXTRACTION
function extract(text){
 return text.split("\n")
  .map(l=>clean(l))
  .filter(l=>l.match(/\d+[.,]\d{2}/) && !l.includes("total"));
}

// 🧠 IA BATCH
async function askAI(lines){

 const uncached = lines.filter(l=>!cache[l]);

 if(uncached.length){

  const prompt = `
Tu es expert en tickets Carrefour.

Corrige ces produits OCR en noms propres :

${JSON.stringify(uncached)}

Réponds en JSON tableau simple.
`;

  const res = await fetch("https://api.mistral.ai/v1/chat/completions",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"mistral-small",
      messages:[{role:"user",content:prompt}]
    })
  });

  const data = await res.json();

  let results=[];
  try{
    results = JSON.parse(data.choices[0].message.content);
  }catch{}

  uncached.forEach((l,i)=>{
    cache[l]=results[i]||l;
  });

  localStorage.setItem("ai_cache",JSON.stringify(cache));
 }

 return lines.map(l=>cache[l]);
}

// 🚀 MAIN
async function analyze(){

 const file=document.getElementById("file").files[0];
 if(!file) return alert("Ajoute image");

 document.getElementById("status").innerText="📸 Analyse...";

 const canvas = await preprocess(file);
 const ocr = await Tesseract.recognize(canvas,'fra');

 const lines = extract(ocr.data.text);
 const interpreted = await askAI(lines);

 const tbody=document.getElementById("out");
 tbody.innerHTML="";

 interpreted.forEach((name,i)=>{

  const price = lines[i].match(/(\d+[.,]\d{2})/)[1];
  const match = matchProduct(name);

  const tr=document.createElement("tr");

  tr.innerHTML=`
    <td>${name}</td>
    <td>${price}</td>
    <td>${match.best || "-"}</td>
    <td>${Math.round(match.score*100)}%</td>
  `;

  tbody.appendChild(tr);
 });

 document.getElementById("status").innerText="✅ Terminé";
}

</script>

</body>
</html>
